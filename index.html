<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Mood Casino</title>
<style>
body{margin:0;font-family:Arial;background:radial-gradient(circle,#2b0000,#000);color:#fcd34d;display:flex;justify-content:center;padding:20px}
.app{max-width:1000px;width:100%}
h1{text-align:center;color:#fbbf24;text-shadow:0 0 10px gold}
.machine{background:#7f1d1d;border-radius:20px;padding:20px;box-shadow:0 0 30px red}
.reels{display:flex;gap:10px;margin:20px 0}
.reel{flex:1;height:100px;background:#000;border:2px solid gold;display:flex;align-items:center;justify-content:center;font-size:40px}
button{padding:10px 20px;margin:5px;border:none;border-radius:10px;background:gold;color:black;font-weight:bold;cursor:pointer}
.result{background:#000;border:2px solid gold;padding:15px;margin-top:20px;border-radius:15px}
.book{border:1px solid gold;margin:5px;padding:8px;border-radius:10px}
</style>
</head>
<body>
<div class="app">
<h1>🎰 Book Mood Casino</h1>
<div class="machine">
<div class="reels">
<div class="reel" id="r1">🎲</div>
<div class="reel" id="r2">📚</div>
<div class="reel" id="r3">🎲</div>
</div>
<button onclick="spin()">SPIN</button>
</div>
<div class="result" id="result">Spin to choose mood</div>
</div>
<script>
const moods=[
{name:"Fantasy",emoji:"🐉"},
{name:"Romance",emoji:"💘"},
{name:"Dark",emoji:"🖤"},
{name:"Adventure",emoji:"🗺️"},
{name:"Emotional",emoji:"💔"},
{name:"Fun",emoji:"😂"},
{name:"Royal",emoji:"👑"},
{name:"Magic",emoji:"✨"}
];

const books=[
"king of gluttony","off campus web series","rites of starling","the paris match","yes chef","forget me not","sweet heat","the dagger and the flame","these infinite threads","undertaking heart mercy","quicksilver","serpent and the wings of the night","artisan trilogy","a broken promise","avalon tower","veiled kingdom","daughter of no worlds","nightshade","road trip with a vampire","deep in love","shadows between us","forest of thousand lanterns","prince so cruel","crown of oaths and curses","bridge kingdom","broken blade","queen's assassin","red sister","heir of illusion","moon hatched","fate inked in blood","trial of the sun queen","riftborn","death's kiss","blood of the sands","throne of the fallen","court this cruel and lovely","divine rivals","one dark window","bone houses","poison daughter","wolf king","blood and steel","house of ashes","love and other brain experiments","no place like you","spiral","practice makes perfect","never over","what happens in amsterdam","unsteady","ready or not"
];

function rand(a){return a[Math.floor(Math.random()*a.length)]}

function getBooksByMood(mood){
return books.filter(b=>{
if(mood=="Fantasy") return b.includes("king")||b.includes("queen")||b.includes("dragon")||b.includes("blood")||b.includes("throne");
if(mood=="Romance") return b.includes("love")||b.includes("romance")||b.includes("kiss")||b.includes("heart");
if(mood=="Dark") return b.includes("dark")||b.includes("death")||b.includes("shadow")||b.includes("ashes");
if(mood=="Adventure") return b.includes("journey")||b.includes("road")||b.includes("trial")||b.includes("quest");
if(mood=="Emotional") return b.includes("broken")||b.includes("promise")||b.includes("never");
if(mood=="Fun") return b.includes("fun")||b.includes("chef")||b.includes("amsterdam");
if(mood=="Royal") return b.includes("king")||b.includes("queen")||b.includes("crown");
if(mood=="Magic") return b.includes("magic")||b.includes("fate")||b.includes("alchemy");
return true;
});
}

function spin(){
let r1=document.getElementById("r1");
let r2=document.getElementById("r2");
let r3=document.getElementById("r3");
let interval=setInterval(()=>{
r1.textContent=rand(moods).emoji;
r2.textContent=rand(moods).emoji;
r3.textContent=rand(moods).emoji;
},100);

setTimeout(()=>{
clearInterval(interval);
let mood=rand(moods);
r1.textContent=mood.emoji;
r2.textContent=mood.emoji;
r3.textContent=mood.emoji;

let picks=getBooksByMood(mood.name);
if(picks.length===0) picks=books;

let chosen=picks.sort(()=>0.5-Math.random()).slice(0,5);

document.getElementById("result").innerHTML=
`<h2>${mood.emoji} ${mood.name}</h2>`+
chosen.map(b=>`<div class='book'>${b}</div>`).join("");
},2000);
}
</script>
</body>
</html>
