<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Mood Slot Machine</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fde7e7, #fff4db, #ffe8cf);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
    }
    .app {
      width: 100%;
      max-width: 900px;
    }
    .title {
      text-align: center;
      margin-bottom: 24px;
    }
    .title h1 {
      margin: 0 0 10px;
      font-size: 40px;
    }
    .title p {
      margin: 0;
      font-size: 18px;
      color: #4b5563;
    }
    .machine {
      background: rgba(255,255,255,0.8);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    }
    .machine-inner {
      background: #111827;
      color: white;
      border-radius: 24px;
      padding: 28px;
    }
    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .reel {
      height: 120px;
      border-radius: 20px;
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.15);
      user-select: none;
    }
    .controls {
      text-align: center;
    }
    button {
      border: none;
      border-radius: 16px;
      background: #f59e0b;
      color: white;
      padding: 16px 28px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.35);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result {
      margin-top: 24px;
      background: rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    .result h2 {
      margin-top: 0;
      font-size: 30px;
    }
    .mood-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .mood-emoji {
      font-size: 54px;
    }
    .suggestions {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .suggestion {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
    }
    .hint {
      color: #6b7280;
    }
    @media (max-width: 640px) {
      .title h1 { font-size: 30px; }
      .reel { font-size: 42px; height: 100px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">
      <h1>3-Slot Book Mood Machine</h1>
      <p>Press spin, get a mood, then choose a book that matches it.</p>
    </div>

    <div class="machine">
      <div class="machine-inner">
        <div class="reels">
          <div class="reel" id="reel1">📚</div>
          <div class="reel" id="reel2">🎲</div>
          <div class="reel" id="reel3">📚</div>
        </div>
        <div class="controls">
          <button id="spinButton">Spin for My Reading Mood</button>
        </div>
      </div>
    </div>

    <div class="result" id="resultBox">
      <h2>Your selected mood</h2>
      <p class="hint">Spin the machine to reveal a reading vibe.</p>
    </div>
  </div>

  <script>
    const moods = [
      {
        label: "Cozy",
        emoji: "☕",
        vibe: "Soft, warm, comforting reads.",
        suggestions: [
          "A gentle romance",
          "A comforting classic",
          "A feel-good small-town story"
        ]
      },
      {
        label: "Thrilling",
        emoji: "⚡",
        vibe: "Fast, tense, impossible to put down.",
        suggestions: [
          "A mystery thriller",
          "A crime novel",
          "A survival story"
        ]
      },
      {
        label: "Adventurous",
        emoji: "🗺️",
        vibe: "Quests, travel, discovery, action.",
        suggestions: [
          "Epic fantasy",
          "Action-packed sci-fi",
          "A journey novel"
        ]
      },
      {
        label: "Romantic",
        emoji: "💘",
        vibe: "Heartfelt, emotional, character-driven.",
        suggestions: [
          "A slow-burn romance",
          "A rom-com",
          "A bittersweet love story"
        ]
      },
      {
        label: "Dark",
        emoji: "🖤",
        vibe: "Moody, gothic, intense.",
        suggestions: [
          "Dark academia",
          "A gothic novel",
          "A psychological drama"
        ]
      },
      {
        label: "Curious",
        emoji: "🧠",
        vibe: "Thought-provoking and idea-rich.",
        suggestions: [
          "Popular science",
          "Philosophy",
          "A literary novel with big themes"
        ]
      },
      {
        label: "Funny",
        emoji: "😂",
        vibe: "Light, witty, playful.",
        suggestions: [
          "A comic novel",
          "A humorous memoir",
          "A smart rom-com"
        ]
      },
      {
        label: "Magical",
        emoji: "✨",
        vibe: "Whimsical, strange, enchanting.",
        suggestions: [
          "Magical realism",
          "Fairy-tale fantasy",
          "An imaginative middle-grade read"
        ]
      }
    ];

    const symbols = ["☕", "⚡", "🗺️", "💘", "🖤", "🧠", "😂", "✨", "📚", "🎲", "🌙", "🌈"];

    const reel1 = document.getElementById("reel1");
    const reel2 = document.getElementById("reel2");
    const reel3 = document.getElementById("reel3");
    const resultBox = document.getElementById("resultBox");
    const spinButton = document.getElementById("spinButton");

    let spinning = false;

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function renderResult(mood) {
      resultBox.innerHTML = `
        <h2>Your selected mood</h2>
        <div class="mood-row">
          <div class="mood-emoji">${mood.emoji}</div>
          <div>
            <div style="font-size: 28px; font-weight: bold;">${mood.label}</div>
            <div style="color:#4b5563; margin-top: 4px;">${mood.vibe}</div>
          </div>
        </div>
        <div style="font-weight:bold; margin-bottom:10px;">Book ideas for this mood</div>
        <div class="suggestions">
          ${mood.suggestions.map(item => `<div class="suggestion">${item}</div>`).join("")}
        </div>
      `;
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinButton.disabled = true;
      spinButton.textContent = "Rolling...";

      resultBox.innerHTML = `
        <h2>Your selected mood</h2>
        <p class="hint">The machine is choosing your reading vibe...</p>
      `;

      const finalMood = randomItem(moods);

      const interval1 = setInterval(() => { reel1.textContent = randomItem(symbols); }, 90);
      const interval2 = setInterval(() => { reel2.textContent = randomItem(symbols); }, 120);
      const interval3 = setInterval(() => { reel3.textContent = randomItem(symbols); }, 150);

      setTimeout(() => {
        clearInterval(interval1);
        reel1.textContent = finalMood.emoji;
      }, 1400);

      setTimeout(() => {
        clearInterval(interval2);
        reel2.textContent = finalMood.emoji;
      }, 1900);

      setTimeout(() => {
        clearInterval(interval3);
        reel3.textContent = finalMood.emoji;
        renderResult(finalMood);
        spinning = false;
        spinButton.disabled = false;
        spinButton.textContent = "Spin for My Reading Mood";
      }, 2400);
    }

    spinButton.addEventListener("click", spin);
  </script>
</body>
</html>
