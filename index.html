<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Mood Slot Machine</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fde7e7, #fff4db, #ffe8cf);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
    }
    .app {
      width: 100%;
      max-width: 900px;
    }
    .title {
      text-align: center;
      margin-bottom: 24px;
    }
    .title h1 {
      margin: 0 0 10px;
      font-size: 40px;
    }
    .title p {
      margin: 0;
      font-size: 18px;
      color: #4b5563;
    }
    .machine {
      background: rgba(255,255,255,0.8);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    }
    .machine-inner {
      background: #111827;
      color: white;
      border-radius: 24px;
      padding: 28px;
    }
    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

      height: 120px;
      border-radius: 20px;
      background: white;
      color: black;
